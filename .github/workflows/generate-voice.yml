name: Generate API voice

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/generate-voice.mjs
      - .github/workflows/generate-voice.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install no-cost neural voice fallback
        run: pip install edge-tts==7.2.8
      - name: Generate Russian, English and Polish narration
        run: node scripts/generate-voice.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TTS_MODEL: tts-1-hd
          OPENAI_TTS_VOICE: nova
          VOICE_MISSING_ONLY: '1'
      - name: Commit generated audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/audio
          git diff --cached --quiet || git commit -m "Generate API narration"
          git push
