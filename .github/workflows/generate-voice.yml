name: Generate API voice

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate Russian, English and Polish narration
        run: node scripts/generate-voice.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TTS_MODEL: tts-1-hd
          OPENAI_TTS_VOICE: nova
      - name: Commit generated audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/audio
          git diff --cached --quiet || git commit -m "Generate API narration"
          git push
